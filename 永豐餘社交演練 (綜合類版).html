<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>永豐餘社交演練 - 綜合類 (2025)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; color: #0f172a; font-family: "Microsoft JhengHei", "Segoe UI", sans-serif; overflow: hidden; }
        @keyframes moveRight { 0% { left: 10%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { left: 90%; opacity: 0; } }
        .animate-packet { animation: moveRight 1.0s linear forwards; }
        .hidden { display: none !important; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #b3b0ad; border-radius: 3px; }
        
        @keyframes modalPop { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .modal-animate { animation: modalPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body class="flex flex-col h-screen w-full bg-slate-100 overflow-hidden">

    <!-- Header -->
    <header class="h-16 border-b-2 border-slate-300 bg-white flex items-center px-6 justify-between shrink-0 shadow-md z-40">
        <div class="flex items-center gap-4 w-1/3">
            <div class="flex items-center gap-2">
                <img src="https://cmlee.neocities.org/2025-11-28%2015%2043%2028.jpg" alt="Logo" class="h-12 w-auto object-contain">
                <div class="border-l-2 border-slate-300 pl-4">
                    <div class="text-[10px] text-slate-500 font-bold tracking-wider uppercase">YFY Security Awareness</div>
                    <span class="font-extrabold text-lg text-slate-900 tracking-tight">社交演練<span class="text-orange-600">綜合類</span></span>
                </div>
            </div>
        </div>
        <div class="flex-1 flex justify-center gap-4">
            <div class="flex flex-col items-center px-4 py-1 rounded-lg bg-green-100 border-2 border-green-300 shadow-sm min-w-[85px]">
                <span class="text-[11px] text-green-800 uppercase tracking-widest font-black">✅ 正確</span>
                <span id="score-correct" class="text-xl font-black text-green-700 leading-none mt-0.5">0</span>
            </div>
            <div class="flex flex-col items-center px-4 py-1 rounded-lg bg-red-100 border-2 border-red-300 shadow-sm min-w-[85px]">
                <span class="text-[11px] text-red-800 uppercase tracking-widest font-black">❌ 錯誤</span>
                <span id="score-wrong" class="text-xl font-black text-red-700 leading-none mt-0.5">0</span>
            </div>
            <div class="flex flex-col items-center px-4 py-1 rounded-lg bg-white border-2 border-slate-300 shadow-sm min-w-[85px]">
                <span class="text-[11px] text-slate-600 uppercase tracking-widest font-black">📝 剩餘</span>
                <span id="score-remaining" class="text-xl font-black text-slate-800 leading-none mt-0.5">10</span>
            </div>
        </div>
        <div class="w-1/3 flex flex-col items-end justify-center">
            <span id="status-display" class="bg-slate-800 text-white px-3 py-0.5 rounded text-xs font-mono font-bold shadow-sm">STATUS: IDLE</span>
        </div>
    </header>

    <!-- Main Content -->
    <div class="flex flex-1 overflow-hidden min-h-0">
        <!-- Left Sidebar -->
        <aside class="w-[300px] bg-white border-r border-slate-300 flex flex-col z-20 shadow-lg shrink-0">
            <div class="px-4 py-3 shrink-0 border-b border-slate-200 bg-slate-50">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="text-base font-black text-slate-800">收件匣</h2>
                    <span class="text-xs font-bold text-slate-500">Outlook Mode</span>
                </div>
            </div>
            <div id="email-list" class="flex-1 overflow-y-auto bg-white"></div>
        </aside>

        <!-- Center: Simulation Stage -->
        <main class="w-[25%] relative bg-slate-200 flex flex-col border-r border-slate-300 shadow-inner shrink-0 hidden md:flex">
            <div class="absolute inset-0 bg-[linear-gradient(rgba(0,0,0,0.05)_1px,transparent_1px),linear-gradient(90deg,rgba(0,0,0,0.05)_1px,transparent_1px)] bg-[size:20px_20px]"></div>
            <div class="flex-1 flex flex-col items-center justify-center relative gap-12 py-4">
                <div class="absolute top-1/2 left-8 right-8 h-[2px] bg-slate-400 -translate-y-1/2 z-0"></div>
                <div id="packet" class="hidden absolute top-1/2 left-8 right-8 -translate-y-1/2 h-10 pointer-events-none z-10">
                    <div class="w-4 h-4 bg-blue-600 rounded-full shadow-[0_0_10px_rgba(0,120,212,0.6)] absolute animate-packet top-1/2 -mt-2 border-2 border-white"></div>
                </div>
                <div class="flex flex-col justify-between h-full w-full px-2 relative z-10 items-center justify-center gap-8">
                    <div id="node-internet" class="w-20 flex flex-col items-center p-2 rounded-lg bg-white border-2 border-slate-400 shadow-md transition-all duration-300 z-10 absolute left-4 top-1/2 -translate-y-1/2">
                        <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center mb-1 text-slate-600">
                            <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" x2="22" y1="12" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                        </div>
                        <span class="text-[9px] text-slate-600 font-black uppercase tracking-wider">Internet</span>
                    </div>
                    <div id="node-user" class="w-20 flex flex-col items-center p-2 rounded-lg bg-white border-2 border-slate-400 shadow-md transition-all duration-500 z-10 absolute right-4 top-1/2 -translate-y-1/2">
                        <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center mb-1 text-slate-600">
                            <svg id="icon-user" class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        </div>
                        <span class="text-[9px] text-slate-600 font-black uppercase tracking-wider">Inbox</span>
                    </div>
                </div>
            </div>
        </main>

        <!-- Right: Reading Pane -->
        <aside class="flex-1 bg-white flex flex-col z-10 overflow-hidden h-full min-w-0 border-l border-slate-200">
            <div id="panel-idle" class="flex-1 flex flex-col items-center justify-center text-slate-400 p-8 text-center bg-slate-50">
                <svg class="w-24 h-24 mb-6 text-slate-300" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
                <p class="text-2xl font-bold text-slate-500 mb-2">選取項目以讀取</p>
            </div>
            <div id="panel-active" class="hidden flex-1 flex flex-col h-full relative bg-white min-h-0">
                <div id="panel-overlay" class="hidden absolute inset-0 bg-slate-100/60 z-20 flex items-center justify-center backdrop-blur-[1px]">
                    <div class="text-center bg-white p-8 rounded-xl shadow-lg border-2 border-slate-200">
                        <div class="text-2xl font-black text-slate-800 mb-2">此題已完成</div>
                        <p class="text-base text-slate-500 font-bold">請選擇其他信件繼續測驗</p>
                    </div>
                </div>
                <div class="px-10 py-8 border-b border-transparent">
                    <div id="preview-subject" class="font-bold text-3xl text-slate-900 mb-6 leading-tight"></div>
                    <div class="flex items-start gap-4">
                        <div id="preview-avatar-large" class="w-12 h-12 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold text-lg shrink-0 shadow-sm"></div>
                        <div class="min-w-0 flex-1">
                            <div class="flex items-baseline gap-3"><span id="preview-sender" class="font-bold text-slate-900 text-xl"></span><span id="preview-email" class="text-sm text-slate-500 font-mono bg-slate-100 px-2 py-0.5 rounded"></span></div>
                            <div class="text-sm text-slate-500 mt-1 font-bold">To: <span class="bg-slate-100 px-2 py-0.5 rounded">You</span></div>
                        </div>
                    </div>
                </div>
                <div class="px-10 py-4 flex-1 overflow-y-auto">
                    <div id="preview-body" class="text-lg text-slate-800 leading-relaxed whitespace-pre-wrap font-sans"></div>
                    <div id="preview-link-container" class="hidden mt-8 p-5 bg-blue-50 rounded-lg border border-blue-100 flex items-center gap-4 hover:bg-blue-100 cursor-pointer transition-colors group">
                        <div class="bg-white p-3 rounded border border-blue-200 text-blue-600 group-hover:border-blue-400 shadow-sm">
                            <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" /></svg>
                        </div>
                        <div class="overflow-hidden flex-1 min-w-0">
                            <div class="font-black text-xs text-blue-600 uppercase mb-1 tracking-wider">Link / Attachment</div>
                            <span id="preview-link" class="truncate font-mono font-bold block text-blue-700 underline decoration-blue-300 underline-offset-2 text-base"></span>
                        </div>
                    </div>
                </div>
                
                <!-- Compact Action Area -->
                <div class="p-2 bg-slate-900 border-t-4 border-orange-500 shrink-0 z-30 relative shadow-[0_-10px_30px_rgba(0,0,0,0.15)]">
                    <div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-orange-600 text-white px-3 py-0.5 rounded-full text-[10px] font-black shadow-lg border-2 border-slate-900 flex items-center gap-1 animate-bounce tracking-widest">
                        <svg class="w-3 h-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
                        您的決定是？
                    </div>
                    <div class="grid grid-cols-2 gap-2 mt-2">
                        <button onclick="takeAction('safe')" class="action-btn group bg-green-600 hover:bg-green-500 text-white border-b-2 border-green-800 hover:border-green-700 p-1.5 rounded-lg shadow-md flex flex-col items-center justify-center gap-0.5 transition-all active:scale-[0.98] active:border-b-0 active:translate-y-0.5">
                            <div class="flex items-center gap-1.5">
                                <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
                                <span class="text-sm font-black tracking-wide">正常郵件</span>
                            </div>
                            <span class="text-[9px] font-bold opacity-80 uppercase tracking-wider scale-90">Safe / Legitimate</span>
                        </button>
                        <button onclick="takeAction('risk')" class="action-btn group bg-red-600 hover:bg-red-500 text-white border-b-2 border-red-800 hover:border-red-700 p-1.5 rounded-lg shadow-md flex flex-col items-center justify-center gap-0.5 transition-all active:scale-[0.98] active:border-b-0 active:translate-y-0.5">
                            <div class="flex items-center gap-1.5">
                                <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                                <span class="text-sm font-black tracking-wide">風險郵件</span>
                            </div>
                            <span class="text-[9px] font-bold opacity-80 uppercase tracking-wider scale-90">Phishing / Spam</span>
                        </button>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <!-- Result Modal (Swapped: Left=Analysis, Right=Email) -->
    <div id="result-modal-overlay" class="hidden fixed inset-0 bg-slate-900/80 z-[100] flex items-center justify-center backdrop-blur-sm p-4">
        <div id="result-modal" class="bg-white border-4 border-white rounded-3xl shadow-2xl w-full max-w-6xl h-[85vh] transform transition-all modal-animate relative flex flex-col overflow-hidden">
            <div class="flex-1 flex flex-col md:flex-row min-h-0">
                <!-- LEFT: Analysis (Centered) -->
                <div class="w-full md:w-1/2 bg-white p-6 md:p-8 overflow-y-auto flex flex-col items-center text-center">
                    <div class="flex-1 w-full max-w-lg flex flex-col justify-center">
                        <div class="flex flex-col items-center gap-4 mb-6">
                            <div id="result-icon-container" class="w-16 h-16 rounded-full flex items-center justify-center shrink-0 border-4"></div>
                            <div>
                                <h3 id="result-title" class="text-3xl font-black text-slate-800 leading-none mb-2"></h3>
                                <p id="result-message" class="text-slate-500 font-bold text-lg leading-tight"></p>
                            </div>
                        </div>
                        <div class="bg-slate-50 p-6 rounded-2xl border-2 border-slate-200 mb-6 shadow-inner w-full">
                            <div class="flex items-center justify-center gap-2 mb-3 border-b border-slate-200 pb-2">
                                <svg class="w-5 h-5 text-slate-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                <div class="font-black text-slate-500 uppercase tracking-widest text-sm">Analysis / 重點分析</div>
                            </div>
                            <div id="explanation-text" class="text-slate-800 whitespace-pre-wrap leading-relaxed font-medium text-lg text-left pl-2"></div>
                        </div>
                    </div>
                    <button id="btn-next-question" onclick="advanceToNext()" class="w-full max-w-lg py-4 bg-slate-900 hover:bg-slate-800 text-white rounded-xl text-xl font-bold shadow-lg transition-transform active:scale-[0.98] flex items-center justify-center gap-2 mt-4 shrink-0">
                        <span>下一題</span>
                        <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
                    </button>
                </div>

                <!-- RIGHT: Reference Email -->
                <div class="w-full md:w-1/2 bg-slate-100 p-6 md:p-8 overflow-y-auto border-l border-slate-200 relative">
                    <div class="sticky top-0 bg-slate-100 pb-4 z-10 flex items-center gap-2 mb-2">
                        <span class="bg-slate-300 text-slate-600 px-2 py-0.5 rounded text-[10px] font-black uppercase tracking-widest">Reference</span>
                        <span class="text-sm font-bold text-slate-500">原始信件內容</span>
                    </div>
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-300">
                        <div class="border-b border-slate-100 pb-4 mb-4">
                            <div class="text-xl font-black text-slate-900 mb-1" id="res-ref-subject"></div>
                            <div class="flex flex-col gap-1">
                                <div class="flex items-baseline gap-2">
                                    <span class="text-xs font-bold text-slate-400 uppercase w-12 shrink-0">From</span>
                                    <span class="text-sm font-bold text-slate-800" id="res-ref-sender"></span>
                                </div>
                                <div class="flex items-baseline gap-2">
                                    <span class="text-xs font-bold text-slate-400 uppercase w-12 shrink-0">Email</span>
                                    <span class="text-xs font-mono text-slate-500 bg-slate-100 px-1 rounded break-all" id="res-ref-email"></span>
                                </div>
                            </div>
                        </div>
                        <div class="text-base text-slate-800 leading-relaxed whitespace-pre-wrap font-sans mb-6" id="res-ref-body"></div>
                        <div id="res-ref-link-container" class="hidden p-3 bg-blue-50 rounded border border-blue-100 flex items-center gap-3">
                            <div class="bg-white p-2 rounded border border-blue-200 text-blue-600 shrink-0">
                                <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" /></svg>
                            </div>
                            <div class="overflow-hidden min-w-0">
                                <div class="font-black text-[10px] text-blue-600 uppercase mb-0.5 tracking-wider">Link / Attachment</div>
                                <span id="res-ref-link" class="truncate font-mono font-bold block text-blue-700 text-xs"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Final Score Modal -->
    <div id="final-score-modal" class="hidden fixed inset-0 bg-slate-900/90 z-[110] flex items-center justify-center backdrop-blur-md">
        <div class="bg-white p-10 rounded-3xl shadow-2xl max-w-md w-full text-center border-8 border-white/20 modal-animate m-4">
            <div class="mb-6 inline-block p-6 bg-blue-100 rounded-full"><svg class="w-16 h-16 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg></div>
            <h2 class="text-4xl font-black text-slate-800 mb-2">測驗完成</h2>
            <p class="text-slate-500 font-bold mb-8 text-lg">您的資安意識成績單</p>
            <div class="flex justify-center items-baseline gap-3 mb-10"><span id="final-score" class="text-7xl font-black text-blue-600">0</span><span class="text-2xl font-bold text-slate-400">/ 100</span></div>
            <div class="grid grid-cols-2 gap-6 mb-10">
                <div class="bg-green-50 p-4 rounded-2xl border-2 border-green-200"><div class="text-sm text-green-600 font-bold uppercase mb-1">Correct</div><div id="final-correct" class="text-3xl font-black text-green-700">0</div></div>
                <div class="bg-red-50 p-4 rounded-2xl border-2 border-red-200"><div class="text-sm text-red-600 font-bold uppercase mb-1">Wrong</div><div id="final-wrong" class="text-3xl font-black text-red-700">0</div></div>
            </div>
            <button onclick="restartGame()" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl text-xl font-bold shadow-xl transition-transform active:scale-95">重新測驗 (隨機抽選)</button>
        </div>
    </div>

    <script>
        const db=[{id:1,type:"phishing",senderName:"建國工程-陳經理",senderEmail:"pm@jianguo-const-verify.com",subject:"【緊急請款】二期廠房地基追加工程款通知",body:"致 財務部/採購部：\n\n因現場開挖發現地下水位過高，需緊急追加止水樁工程。\n追加金額：新台幣 2,500,000 元。\n\n請查閱附件之工程變更單，並請於今日內匯入指定之「專案臨時帳戶」以利備料。",link:"attachment: 追加工程報價單_v2.pdf",explanation:"⚠️ 風險指標 (假追加工程)：\n1. 寄件者網域異常 (jianguo-const-verify.com)。\n2. 要求匯入「新帳戶」或「臨時帳戶」。\n3. 利用「緊急」、「需立即備料」製造壓力。"},{id:2,type:"phishing",senderName:"中鋼鋁業 Sales",senderEmail:"sales@csc-steel-price-update.com",subject:"【重要通知】鋼材價格調整與補款說明",body:"親愛的合作夥伴：\n\n受國際原物料行情影響，鋼筋價格本週突然上漲 22%。\n貴公司之訂單若要確保如期交貨，需立即補足差額 580 萬元。\n\n請將款項匯至本公司新的「原物料避險專戶」，以免違約影響工程進度。",link:"attachment: 價格調整通知書.pdf",explanation:"⚠️ 風險指標 (原物料漲價)：\n1. 理由為「國際價格暴漲」，要求「補差額」。\n2. 威脅「延誤交貨」或「違約責任」。\n3. 關鍵在於要求匯款到「新帳戶」。"},{id:3,type:"phishing",senderName:"工務部-林協理",senderEmail:"lin.vp.yfy@gmail.com",subject:"Fwd: 現場急需現金支付材料款",body:"我在工地現場訊號不好，無法登入系統。\n\n這批進口閥件廠商要求現金票或即時匯款才能卸貨，金額 300 萬。\n請幫我先用特急件處理匯款到下方廠商帳戶，我回公司再補簽呈。\n\n廠商帳號：(822) 123-543...",link:"",explanation:"⚠️ 風險指標 (假冒主管/BEC)：\n1. 使用外部信箱 (gmail) 冒充內部高層。\n2. 理由通常是「出差」、「訊號不好」、「無法進系統」。\n3. 試圖繞過正規採購/請款流程。"},{id:4,type:"phishing",senderName:"機電統包商",senderEmail:"engineering@mep-design-change.net",subject:"變更設計核定單 (Change Order #2025-05)",body:"依據上週工務會議決議，消防設備規格變更如附件。\n\n本次變更追加款項已含稅，請確認附件內容無誤後，安排撥款至指定帳戶。\n\n(附件文件蓋有完整公司大小章)",link:"attachment: CO_202505_Signed.pdf",explanation:"⚠️ 風險指標 (變更設計詐騙)：\n1. 文件看起來非常專業，甚至有偽造的印章。\n2. 駭客通常盜用舊文件格式，只修改「金額」與「收款帳號」。\n3. 網域 @mep-design-change.net 為偽造。"},{id:5,type:"phishing",senderName:"財務部 (Vendor)",senderEmail:"billing@longterm-vendor-audit.com",subject:"【重要】本公司銀行帳戶變更通知",body:"致 財務窗口：\n\n因本公司進行年度稅務審計與帳戶整合，原收款帳號將於今日起停用。\n\n請將本期估驗款 1,500 萬元改匯至以下新帳號：\n銀行：國泰世華 (013)\n帳號：220-03-xxxxx\n\n請務必更新貴司 ERP 系統資料。",link:"attachment: 帳戶變更切結書.pdf",explanation:"⚠️ 風險指標 (匯款帳號變更 BEC)：\n1. 這是最危險的詐騙類型！\n2. 只要看到「改匯新帳號」，90% 是詐騙。\n3. 必須透過「第二管道」（如打電話給原本認識的廠商窗口）進行查證。"},{id:6,type:"normal",senderName:"採購部",senderEmail:"purchase@YFY.COM",subject:"2025 年度供應商評鑑會議通知",body:"各單位主管好，\n\n年度供應商評鑑會議將於下週三舉行，請相關工程單位準備評分資料。\n\n會議連結：Teams Link",link:"https://teams.microsoft.com/l/meetup...",explanation:"✅ 安全特徵：\n1. 內部常態性會議通知。\n2. 寄件者為內部網域 (@YFY.COM)。\n3. 無涉及金流或帳號變更。"},{id:7,type:"normal",senderName:"震旦行客服",senderEmail:"service@aurora.com.tw",subject:"12月份事務機租賃費用對帳單",body:"親愛的客戶您好，\n\n附件為本月影印機租賃與耗材費用發票。\n請依合約約定帳號進行付款。\n\n謝謝您的支持。",link:"attachment: inv_202412.pdf",explanation:"✅ 安全特徵：\n1. 來自已知供應商的官方網域。\n2. 內容為例行性對帳。\n3. **未要求變更匯款帳號**。"},{id:8,type:"phishing",senderName:"經濟部工業局",senderEmail:"grant@moea-gov-support.org",subject:"【通知】低碳轉型設備補助款申請補件",body:"貴公司申請之「低碳設備補助」尚缺部分文件。\n\n請下載附件執行檔，安裝後上傳最新的設備清單與發票影本，以免喪失補助資格。",link:"http://moea-grant.org/setup.exe",explanation:"⚠️ 風險指標：\n1. 政府單位不會要求下載 .exe 執行檔。\n2. 網域非 .gov.tw。\n3. 利用補助款金額吸引點擊。"},{id:9,type:"normal",senderName:"監造單位",senderEmail:"supervision@tech-eng.com.tw",subject:"2025/01/15 工地施工日誌",body:"今日施工進度報告如附件。\n\n本日出工人數：45人\n完成項目：3F 樓板澆置\n異常狀況：無",link:"attachment: daily_report.pdf",explanation:"✅ 安全特徵：\n1. 例行性工程報告。\n2. 附件為 PDF 且內容合理。\n3. 無金流要求。"},{id:10,type:"normal",senderName:"ERP System",senderEmail:"workflow@YFY.COM",subject:"【待簽核】請購單 PR-20250032",body:"您有一筆待簽核的請購單。\n\n申請單位：工務部\n品項：高壓電纜\n金額：$120,000\n\n請登入 ERP 系統進行簽核。",link:"http://erp.yfy.com/workflow",explanation:"✅ 安全特徵：\n1. 內部系統自動通知。\n2. 連結指向內部 ERP 網址。\n3. 流程符合公司規範。"},{id:11,type:"phishing",senderName:"Cloud Invoice",senderEmail:"no-reply@invoice-hosting-fake.com",subject:"您有一張未支付的工程保留款發票",body:"系統偵測到貴公司尚有一筆工程保留款未支付，已逾期 30 天。\n\n點擊此處查看發票明細並立即付款。",link:"http://malicious-link.com/pay",explanation:"⚠️ 風險指標：\n1. 使用泛用的雲端發票名義，而非具體廠商。\n2. 製造「逾期」恐慌。\n3. 連結導向不明網站。"},{id:12,type:"normal",senderName:"PM Office",senderEmail:"pm@YFY.COM",subject:"新廠擴建案 - 第 15 次工務會議紀錄",body:"各位同仁好，\n\n附件為昨日會議紀錄，請各單位依決議事項辦理。\n下次會議時間：1/22 14:00",link:"attachment: minutes_15.docx",explanation:"✅ 安全特徵：\n1. 內部會議紀錄分發。\n2. 無異常要求。"}];
        
        let state={selectedId:null,simState:'idle',activeEmails:[],processedIds:[],results:{},correctCount:0,wrongCount:0,currentResult:null};
        function getInitials(n){const p=n.trim().split(' ');return p.length===1?p[0].substring(0,2).toUpperCase():(p[0][0]+p[p.length-1][0]).toUpperCase();}
        function getAvatarColor(n){const c=['bg-pink-600','bg-purple-600','bg-indigo-600','bg-blue-600','bg-teal-600','bg-green-600','bg-orange-600','bg-red-600'];let h=0;for(let i=0;i<n.length;i++)h=n.charCodeAt(i)+((h<<5)-h);return c[Math.abs(h)%c.length];}
        function getRandomTime(){return `${Math.floor(Math.random()*9)+9}:${Math.floor(Math.random()*60).toString().padStart(2,'0')}`;}
        function getRandomSubarray(arr,size){let s=arr.slice(0),i=arr.length,t,idx;while(i--){idx=Math.floor(Math.random()*(i+1));t=s[idx];s[idx]=s[i];s[i]=t;}return s.slice(0,size);}
        function initGame(){state.activeEmails=getRandomSubarray(db,10).map(e=>({...e,time:getRandomTime()}));state.selectedId=null;state.simState='idle';state.processedIds=[];state.results={};state.correctCount=0;state.wrongCount=0;state.currentResult=null;document.getElementById('final-score-modal').classList.add('hidden');render();}
        function render(){renderScoreboard();renderInbox();renderStage();renderPanel();}
        function renderScoreboard(){document.getElementById('score-correct').textContent=state.correctCount;document.getElementById('score-wrong').textContent=state.wrongCount;document.getElementById('score-remaining').textContent=state.activeEmails.length-state.processedIds.length;document.getElementById('status-display').textContent=`STATUS: ${state.simState.toUpperCase()}`;}
        function renderInbox(){
            const l=document.getElementById('email-list');l.innerHTML='';
            state.activeEmails.forEach(e=>{
                const p=state.processedIds.includes(e.id),s=state.selectedId===e.id,c=state.results[e.id]===true,ac=getAvatarColor(e.senderName),inits=getInitials(e.senderName),ha=e.link&&(e.link.includes('attachment')||e.link.endsWith('.pdf')||e.link.endsWith('.docx'));
                const d=document.createElement('div');d.className=`flex gap-3 p-3 border-b border-slate-200 cursor-pointer relative group select-none transition-colors ${s?'bg-blue-50':'bg-white hover:bg-slate-50'}`;
                if(!p||s)d.onclick=()=>selectEmail(e.id);
                const sb=s?`<div class="absolute left-0 top-0 bottom-0 w-[4px] bg-blue-600"></div>`:'';
                const op=p?'opacity-50 grayscale':'';
                const si=p?`<div class="absolute right-3 top-1/2 -translate-y-1/2 z-10">${c?'<div class="bg-green-100 text-green-700 p-1 rounded-full"><svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>':'<div class="bg-red-100 text-red-700 p-1 rounded-full"><svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></div>'}</div>`:'';
                d.innerHTML=`${sb}${si}<div class="shrink-0 mt-1 ${op}"><div class="w-8 h-8 rounded-full ${ac} flex items-center justify-center text-white text-xs font-bold tracking-wide shadow-sm">${inits}</div></div><div class="flex-1 min-w-0 ${op}"><div class="flex justify-between items-baseline mb-0.5"><span class="text-sm font-black text-slate-800 truncate pr-2">${e.senderName}</span><span class="text-[10px] text-slate-500 font-bold whitespace-nowrap">${e.time}</span></div><div class="text-xs font-bold text-slate-700 truncate mb-0.5 leading-tight">${e.subject}</div><div class="text-xs text-slate-500 truncate leading-tight font-medium">${e.body.replace(/\n/g,' ')}</div></div><div class="shrink-0 flex flex-col items-end justify-between py-1 ${op}">${ha?'<svg class="w-3 h-3 text-slate-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" /></svg>':''}</div>`;
                l.appendChild(d);
            });
        }
        function renderStage(){
            const pkt=document.getElementById('packet'),ni=document.getElementById('node-internet'),nu=document.getElementById('node-user'),iu=document.getElementById('icon-user'),rmo=document.getElementById('result-modal-overlay'),nb=document.getElementById('btn-next-question');
            if(state.simState==='transit'){pkt.classList.remove('hidden');ni.classList.add('border-blue-500','shadow-lg','shadow-blue-200');}else{pkt.classList.add('hidden');ni.classList.remove('border-blue-500','shadow-lg','shadow-blue-200');}
            if(state.simState==='arrived'){nu.className="w-20 flex flex-col items-center p-2 rounded-lg border-2 transition-all duration-500 bg-yellow-50 border-yellow-400 scale-110 shadow-[0_0_20px_rgba(234,179,8,0.4)] z-10 absolute right-4 top-1/2 -translate-y-1/2";iu.classList.add('text-yellow-600','animate-bounce');}
            else if(state.simState==='resolved'){const cc=state.currentResult.success?'bg-green-50 border-green-500':'bg-red-50 border-red-500';nu.className=`w-20 flex flex-col items-center p-2 rounded-lg border-2 transition-all duration-500 ${cc} z-10 absolute right-4 top-1/2 -translate-y-1/2`;iu.classList.remove('text-yellow-600','animate-bounce');}
            else{nu.className="w-20 flex flex-col items-center p-2 rounded-lg bg-white border-2 border-slate-400 shadow-md transition-all duration-500 z-10 absolute right-4 top-1/2 -translate-y-1/2";iu.classList.remove('text-yellow-600','animate-bounce');}
            if(state.simState==='resolved'&&state.currentResult){
                rmo.classList.remove('hidden');
                const ric=document.getElementById('result-icon-container'),rt=document.getElementById('result-title'),rm=document.getElementById('result-message'),et=document.getElementById('explanation-text');
                if(state.currentResult.success){ric.className="w-16 h-16 rounded-full flex items-center justify-center shrink-0 border-4 border-green-100 bg-green-50 text-green-600";ric.innerHTML=`<svg class="w-8 h-8" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>`;rt.textContent="回答正確";rt.className="text-3xl font-black text-green-700 leading-none mb-1";}
                else{ric.className="w-16 h-16 rounded-full flex items-center justify-center shrink-0 border-4 border-red-100 bg-red-50 text-red-600";ric.innerHTML=`<svg class="w-8 h-8" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>`;rt.textContent="回答錯誤";rt.className="text-3xl font-black text-red-700 leading-none mb-1";}
                rm.textContent=state.currentResult.message;et.textContent=state.currentResult.explanation;
                const e=state.activeEmails.find(x=>x.id===state.selectedId);document.getElementById('res-ref-subject').textContent=e.subject;document.getElementById('res-ref-sender').textContent=e.senderName;document.getElementById('res-ref-email').textContent=`<${e.senderEmail}>`;document.getElementById('res-ref-body').textContent=e.body;
                const lc=document.getElementById('res-ref-link-container');if(e.link){lc.classList.remove('hidden');document.getElementById('res-ref-link').textContent=e.link;}else{lc.classList.add('hidden');}
                if(state.processedIds.length===state.activeEmails.length){nb.innerHTML=`<span>查看成績單 🏆</span>`;nb.classList.replace('bg-slate-900','bg-blue-600');}else{nb.innerHTML=`<span>下一題</span><svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>`;nb.classList.replace('bg-blue-600','bg-slate-900');}
            }else{rmo.classList.add('hidden');}
        }
        function renderPanel(){
            const ip=document.getElementById('panel-idle'),ap=document.getElementById('panel-active'),ov=document.getElementById('panel-overlay');
            if(state.simState==='idle'||state.simState==='transit'){ip.classList.remove('hidden');ap.classList.add('hidden');return;}
            ip.classList.add('hidden');ap.classList.remove('hidden');
            const e=state.activeEmails.find(x=>x.id===state.selectedId);if(!e)return;
            if(state.processedIds.includes(e.id)&&state.simState!=='resolved')ov.classList.remove('hidden');else ov.classList.add('hidden');
            document.getElementById('preview-sender').textContent=e.senderName;document.getElementById('preview-email').textContent=`<${e.senderEmail}>`;document.getElementById('preview-subject').textContent=e.subject;document.getElementById('preview-body').textContent=e.body;
            const ad=document.getElementById('preview-avatar-large');ad.className=`w-12 h-12 rounded-full flex items-center justify-center text-white font-bold text-lg shrink-0 shadow-sm ${getAvatarColor(e.senderName)}`;ad.textContent=getInitials(e.senderName);
            const lc=document.getElementById('preview-link-container');if(e.link){lc.classList.remove('hidden');document.getElementById('preview-link').textContent=e.link;}else{lc.classList.add('hidden');}
            document.querySelectorAll('.action-btn').forEach(b=>{if(state.simState==='resolved'||state.processedIds.includes(e.id))b.classList.add('opacity-40','pointer-events-none','grayscale');else b.classList.remove('opacity-40','pointer-events-none','grayscale');});
        }
        function selectEmail(id){if(state.simState==='transit')return;if(state.processedIds.includes(id)){state.selectedId=id;state.simState='arrived';state.currentResult=null;render();return;}state.selectedId=id;state.simState='transit';state.currentResult=null;render();setTimeout(()=>{state.simState='arrived';render();},1000);}
        function takeAction(a){
            const e=state.activeEmails.find(x=>x.id===state.selectedId);if(state.processedIds.includes(e.id))return;
            let s=false,m="";
            if(a==='safe'){if(e.type==='normal'){s=true;m="判斷正確！這是安全的正常信件。";}else{s=false;m="危險！這是一封針對工程/財務的詐騙信件。";}}
            else if(a==='risk'){if(e.type==='phishing'){s=true;m="太棒了！您成功識破了詐騙手法。";}else{s=false;m="哎呀！這是正常的公司內部或廠商信件。";}}
            state.currentResult={success:s,message:m,explanation:e.explanation};state.simState='resolved';state.processedIds.push(e.id);state.results[e.id]=s;if(s)state.correctCount++;else state.wrongCount++;render();
        }
        function advanceToNext(){if(state.processedIds.length===state.activeEmails.length){showFinalScore();return;}const n=state.activeEmails.find(x=>!state.processedIds.includes(x.id));if(n)selectEmail(n.id);else{state.simState='idle';render();}}
        function showFinalScore(){document.getElementById('final-score').textContent=state.correctCount*10;document.getElementById('final-correct').textContent=state.correctCount;document.getElementById('final-wrong').textContent=state.wrongCount;document.getElementById('final-score-modal').classList.remove('hidden');}
        function restartGame(){initGame();}
        window.onload=initGame;
    </script>
